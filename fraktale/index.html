<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌀 Mandelbrot Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;color:#eee;display:flex;flex-direction:column;height:100dvh;touch-action:none}
#top{flex:1;display:flex;justify-content:center;align-items:center;padding:0.5rem;min-height:0}
canvas{border-radius:8px;max-width:100%;max-height:100%}
.panel{background:rgba(15,15,30,0.98);border-top:1px solid #333;padding:1rem 1.2rem;display:grid;grid-template-columns:1fr 1fr;gap:0.8rem 2rem}
@media(max-width:500px){.panel{grid-template-columns:1fr;gap:0.6rem}}
.ctrl{display:flex;align-items:center;gap:0.6rem}
.ctrl label{font-size:clamp(0.85rem,3vw,1rem);min-width:90px;color:#aab}
.ctrl input[type=range]{flex:1;height:6px;-webkit-appearance:none;background:rgba(255,255,255,0.12);border-radius:3px;outline:none}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#00d2ff;cursor:pointer;box-shadow:0 0 6px rgba(0,210,255,0.4)}
.ctrl .val{font-size:clamp(0.85rem,3vw,1rem);color:#00d2ff;min-width:40px;text-align:right;font-weight:bold}
.hint{grid-column:1/-1;text-align:center;font-size:clamp(0.7rem,2.5vw,0.8rem);color:#666;margin-top:0.2rem}
.copyright{position:fixed;bottom:3px;right:8px;font-size:0.6rem;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div id="top"><canvas id="c"></canvas></div>
<div class="panel">
  <div class="ctrl"><label>Iterationen</label><input type="range" id="iter" min="30" max="500" value="120"><span class="val" id="v-iter">120</span></div>
  <div class="ctrl"><label>Farbton</label><input type="range" id="hue" min="0" max="360" value="0"><span class="val" id="v-hue">0°</span></div>
  <div class="ctrl"><label>Sättigung</label><input type="range" id="sat" min="20" max="100" value="85"><span class="val" id="v-sat">85%</span></div>
  <div class="ctrl"><label>Symmetrie</label><input type="range" id="sym" min="1" max="12" value="1"><span class="val" id="v-sym">–</span></div>
  <div class="hint">Mausrad/Pinch = Zoom • Drag = Verschieben • Doppelklick = Reinzoomen</div>
</div>
<div class="copyright">© Caroline Hoffmann</div>
<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let W, H, imgData;
let panX = -0.5, panY = 0, zoom = 1;

function setupCanvas() {
  const c = document.getElementById('top');
  const s = Math.floor(Math.min(c.clientWidth - 12, c.clientHeight - 12, 800));
  W = canvas.width = Math.max(s, 150);
  H = canvas.height = Math.max(s, 150);
  imgData = ctx.createImageData(W, H);
}

function getP() {
  const iter = +document.getElementById('iter').value;
  const hue = +document.getElementById('hue').value;
  const sat = +document.getElementById('sat').value;
  const sym = +document.getElementById('sym').value;
  document.getElementById('v-iter').textContent = iter;
  document.getElementById('v-hue').textContent = hue + '°';
  document.getElementById('v-sat').textContent = sat + '%';
  document.getElementById('v-sym').textContent = sym === 1 ? '–' : sym + 'x';
  return { iter, hue, sat, sym };
}

function hsl(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)); };
  return [f(0) * 255 | 0, f(8) * 255 | 0, f(4) * 255 | 0];
}

function render() {
  const p = getP();
  const data = imgData.data;
  const scale = 3 / zoom;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      let x = (px / W - 0.5) * scale + panX;
      let y = (py / H - 0.5) * scale + panY;

      if (p.sym > 1) {
        const r = Math.sqrt(x * x + y * y);
        let a = Math.atan2(y, x);
        const sec = Math.PI * 2 / p.sym;
        a = Math.abs(((a % sec) + sec) % sec - sec / 2);
        x = Math.cos(a) * r; y = Math.sin(a) * r;
      }

      let zr = 0, zi = 0, n = 0;
      for (; n < p.iter; n++) {
        const zr2 = zr * zr, zi2 = zi * zi;
        if (zr2 + zi2 > 4) break;
        zi = 2 * zr * zi + y;
        zr = zr2 - zi2 + x;
      }

      const idx = (py * W + px) * 4;
      if (n === p.iter) {
        data[idx] = data[idx + 1] = data[idx + 2] = 0;
      } else {
        // Smooth coloring
        const t = n / p.iter;
        const h = (t * 720 + p.hue) % 360;
        const l = 8 + t * 72;
        const [r, g, b] = hsl(h, p.sat, l);
        data[idx] = r; data[idx + 1] = g; data[idx + 2] = b;
      }
      data[idx + 3] = 255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

let tid;
function sched() { clearTimeout(tid); tid = setTimeout(render, 60); }
document.querySelectorAll('.panel input').forEach(el => el.addEventListener('input', sched));

// Zoom helpers
function zoomAt(mx, my, factor) {
  const scale = 3 / zoom;
  const wx = (mx - 0.5) * scale + panX;
  const wy = (my - 0.5) * scale + panY;
  zoom *= factor;
  const ns = 3 / zoom;
  panX = wx - (mx - 0.5) * ns;
  panY = wy - (my - 0.5) * ns;
  sched();
}

// Mouse drag
let drag = false, dx, dy;
canvas.addEventListener('mousedown', e => { drag = true; dx = e.clientX; dy = e.clientY; });
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const s = 3 / zoom;
  panX -= (e.clientX - dx) / W * s; panY -= (e.clientY - dy) / H * s;
  dx = e.clientX; dy = e.clientY; sched();
});
window.addEventListener('mouseup', () => drag = false);

// Wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;
  zoomAt(mx, my, e.deltaY < 0 ? 1.3 : 0.77);
}, { passive: false });

// Double click zoom
canvas.addEventListener('dblclick', e => {
  const rect = canvas.getBoundingClientRect();
  zoomAt((e.clientX - rect.left) / rect.width, (e.clientY - rect.top) / rect.height, 2.5);
});

// Touch: pan + pinch
let tx, ty, pinch = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  if (e.touches.length === 2) pinch = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    const rect = canvas.getBoundingClientRect();
    const cx = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) / rect.width;
    const cy = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) / rect.height;
    zoomAt(cx, cy, d / pinch);
    pinch = d;
  } else {
    const s = 3 / zoom;
    panX -= (e.touches[0].clientX - tx) / W * s; panY -= (e.touches[0].clientY - ty) / H * s;
    tx = e.touches[0].clientX; ty = e.touches[0].clientY; sched();
  }
});

window.addEventListener('resize', () => { setupCanvas(); render(); });
setupCanvas();
render();
</script>
</body>
</html>
