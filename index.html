<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 Spiele-Sammlung</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Comic Sans MS', cursive; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
h1 { color: #fff; font-size: 2.5rem; margin-bottom: 2rem; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
.games { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; max-width: 800px; width: 100%; }
.card { background: #fff; border-radius: 16px; padding: 2rem; text-align: center; text-decoration: none; color: #333; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
.card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.25); }
.card .emoji { font-size: 3rem; margin-bottom: 0.5rem; }
.card h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
.card p { font-size: 0.9rem; color: #666; }
</style>
</head>
<body>
<h1>🎮 Spiele-Sammlung</h1>
<div class="games">
  <a class="card" href="nagelspiel/index.html">
    <div class="emoji">🔨</div>
    <h2>Nagel-Hammer Spiel</h2>
    <p>Triff den vorbeiflitzenden Nagel mit dem Hammer!</p>
  </a>
  <a class="card" href="schulaufwand/index.html">
    <div class="emoji">📚</div>
    <h2>Schulfleiß & Abitur</h2>
    <p>Wie wirkt sich täglicher Fleiß auf die Abi-Vorbereitung aus?</p>
  </a>
</div>
</body>
</html>
