<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💐 Blumenstrauß-Wurf</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #1a2a1a; display: flex; justify-content: center; align-items: center; height: 100dvh; touch-action: none; font-family: 'Comic Sans MS', cursive; }
canvas { display: block; max-width: 100vw; max-height: 100dvh; }
#ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 1.5rem; font-size: clamp(1rem, 4vw, 1.3rem); color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: clamp(1.2rem, 5vw, 2rem); color: #fff; text-shadow: 2px 2px 6px rgba(0,0,0,0.9); pointer-events: none; opacity: 0; transition: opacity 0.3s; text-align: center; z-index: 15; }
#hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: clamp(0.8rem, 3vw, 1rem); color: #ffd700; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); animation: pulse 2s infinite; text-align: center; z-index: 10; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.copyright { position: absolute; bottom: 5px; right: 10px; font-size: 0.7rem; color: rgba(255,255,255,0.3); z-index: 10; }
</style>
</head>
<body>
<div id="ui">
<span>💐 Würfe: <span id="throws">0</span>/3</span>
<span>⭐ Punkte: <span id="score">0</span></span>
</div>
<div id="msg"></div>
<div id="hint">Maus/Touch auf Ziel zielen und loslassen zum Werfen!</div>
<div id="gameover" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#fff;padding:2rem 3rem;border-radius:16px;text-align:center;display:none;z-index:20;">
<h2 style="font-size:1.6rem;margin-bottom:0.5rem;">🏆 Spiel vorbei!</h2>
<p style="font-size:1.2rem;margin:0.5rem 0;">Punkte: <span id="finalScore">0</span></p>
<button onclick="restart(); event.stopPropagation();" style="margin-top:1rem;padding:0.8rem 2rem;font-size:1.1rem;border:none;border-radius:8px;background:#4CAF50;color:#fff;cursor:pointer;font-family:inherit;">Nochmal!</button>
</div>
<canvas id="c"></canvas>
<div class="copyright">© Caroline Hoffmann</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = 800;
const H = canvas.height = 550;

function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize(); window.addEventListener('resize', resize);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let musicStarted = false;

function playCheer() {
  // Crowd noise burst
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.3 * (1 - i/d.length);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2000; bp.Q.value = 0.5;
  const g = audioCtx.createGain(); g.gain.value = 0.15;
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination); src.start();
}

function playCatch() {
  const t = audioCtx.currentTime;
  [660, 880, 1100].forEach((f, i) => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = f;
    g.gain.setValueAtTime(0.12, t + i*0.1); g.gain.linearRampToValueAtTime(0, t + i*0.1 + 0.1);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i*0.1); osc.stop(t + i*0.1 + 0.12);
  });
}

function playYay() {
  const t = audioCtx.currentTime;
  [523, 659, 784, 1047].forEach((f, i) => {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.value = f;
    g.gain.setValueAtTime(0.1, t + i*0.12); g.gain.linearRampToValueAtTime(0, t + i*0.12 + 0.2);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t + i*0.12); osc.stop(t + i*0.12 + 0.25);
  });
}

function startMusic() {
  if (musicStarted) return;
  musicStarted = true; audioCtx.resume();
  const master = audioCtx.createGain(); master.gain.value = 0.06; master.connect(audioCtx.destination);
  const noteMap = {'C':0,'D':2,'E':4,'F':5,'G':7,'A':9,'B':11};
  function freq(n) { return 440 * Math.pow(2, (noteMap[n[0]] - 9) / 12 + (parseInt(n.slice(-1)) - 4)); }
  const melody = ['C4','E4','G4','C5','G4','E4','C4','D4','F4','A4','D5','A4','F4','D4','E4','G4'];
  let nextTime = audioCtx.currentTime;
  const beat = 0.3;
  function loop() {
    while (nextTime < audioCtx.currentTime + 1) {
      melody.forEach((n, i) => {
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.value = freq(n);
        const t = nextTime + i * beat;
        g.gain.setValueAtTime(0.5, t); g.gain.linearRampToValueAtTime(0, t + beat * 0.8);
        osc.connect(g); g.connect(master); osc.start(t); osc.stop(t + beat);
      });
      nextTime += melody.length * beat;
    }
    setTimeout(loop, 500);
  }
  loop();
  // Ambient crowd murmur
  const crowdBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const cd = crowdBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1);
  const crowd = audioCtx.createBufferSource(); crowd.buffer = crowdBuf; crowd.loop = true;
  const cbp = audioCtx.createBiquadFilter(); cbp.type = 'bandpass'; cbp.frequency.value = 1500; cbp.Q.value = 0.3;
  const cg = audioCtx.createGain(); cg.gain.value = 0.025;
  crowd.connect(cbp); cbp.connect(cg); cg.connect(audioCtx.destination); crowd.start();
}

// Game state
const podiumX = [100, 45, 155]; // center X for 1st, 2nd, 3rd place
const podiumBaseY = H - 10; // bottom of podium
const podiumH = [100, 70, 70]; // heights
let currentThrower = 0;
let throwsLeft = 3;
let score = 0;
let bouquet = null;
let aiming = false;
let aimX = 0, aimY = 0;
let state = 'aim';
let caughtBy = '';
let passState = 0;
let passProgress = 0;
let celebrateTimer = 0;
let childHappy = 0;

// Family positions (right side, man closest to podium)
const manPos = { x: 480, y: 400 };
const womanPos = { x: 570, y: 410 };
const childPos = { x: 650, y: 425 };

function canCatch(bx, by, person) {
  const p = person === 'man' ? manPos : person === 'woman' ? womanPos : childPos;
  const reach = person === 'man' ? 55 : person === 'woman' ? 45 : 40;
  return Math.abs(bx - p.x) < reach && Math.abs(by - (p.y - 40)) < reach;
}

function showMsg(text, duration) {
  const el = document.getElementById('msg');
  el.textContent = text; el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, duration || 2000);
}

// --- Pre-generate static crowd so no flickering ---
const crowdPeople = [];
for (let row = 0; row < 4; row++) {
  for (let col = 0; col < 14; col++) {
    const x = 380 + col * 28 + (row % 2) * 14 + (Math.random() - 0.5) * 8;
    const y = 160 + row * 38 + (Math.random() - 0.5) * 6;
    const skinHue = 20 + Math.random() * 25;
    const skinLight = 50 + Math.random() * 25;
    const shirtHue = Math.random() * 360;
    const shirtLight = 35 + Math.random() * 30;
    crowdPeople.push({ x, y, skinHue, skinLight, shirtHue, shirtLight });
  }
}

// Drawing
function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#2a6db5'); sky.addColorStop(0.5, '#5a9fd4'); sky.addColorStop(0.7, '#8ac4ea'); sky.addColorStop(1, '#4a8c3a');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Stadium/grass floor
  ctx.fillStyle = '#3d8a2e'; ctx.fillRect(0, H * 0.62, W, H * 0.4);
  // Track markings (triathlon finish area)
  ctx.fillStyle = '#c0392b'; ctx.fillRect(0, H * 0.62, W, 4);
  ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, H * 0.62 + 4, W, 2);

  // Background stands (simple gradient)
  const standGrad = ctx.createLinearGradient(350, 100, 350, 340);
  standGrad.addColorStop(0, '#4a4a5a'); standGrad.addColorStop(1, '#3a3a4a');
  ctx.fillStyle = standGrad;
  ctx.beginPath();
  ctx.moveTo(350, 340); ctx.lineTo(350, 130); ctx.lineTo(W, 100); ctx.lineTo(W, 340);
  ctx.closePath(); ctx.fill();
  // Stand rows
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
  for (let y = 160; y < 340; y += 38) {
    ctx.beginPath(); ctx.moveTo(350, y); ctx.lineTo(W, y - 8); ctx.stroke();
  }
}

function drawCrowd() {
  // Static pre-generated crowd with nice schemenhaft faces
  crowdPeople.forEach(p => {
    // Body/shirt
    ctx.fillStyle = `hsl(${p.shirtHue}, 50%, ${p.shirtLight}%)`;
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 16, 9, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = `hsl(${p.skinHue}, 40%, ${p.skinLight}%)`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI * 2); ctx.fill();
    // Schematic face features (subtle)
    ctx.fillStyle = `hsla(${p.skinHue}, 30%, ${p.skinLight - 20}%, 0.5)`;
    // Eyes as tiny dots
    ctx.beginPath(); ctx.arc(p.x - 3, p.y - 1, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.x + 3, p.y - 1, 1.5, 0, Math.PI * 2); ctx.fill();
    // Mouth hint
    ctx.strokeStyle = `hsla(${p.skinHue}, 30%, ${p.skinLight - 25}%, 0.4)`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(p.x, p.y + 4, 3, 0.2, Math.PI - 0.2); ctx.stroke();
    // Hair
    ctx.fillStyle = `hsl(${p.skinHue - 5}, 30%, ${Math.max(10, p.skinLight - 30)}%)`;
    ctx.beginPath(); ctx.arc(p.x, p.y - 3, 8, Math.PI, 0); ctx.fill();
  });
}

function drawPodium() {
  const blocks = [
    { x: 75, w: 55, h: podiumH[0], label: '1' },
    { x: 20, w: 55, h: podiumH[1], label: '2' },
    { x: 130, w: 55, h: podiumH[2], label: '3' }
  ];
  blocks.forEach(b => {
    const grad = ctx.createLinearGradient(b.x, podiumBaseY - b.h, b.x + b.w, podiumBaseY);
    grad.addColorStop(0, '#e8c840'); grad.addColorStop(0.3, '#ffd700'); grad.addColorStop(0.7, '#daa520'); grad.addColorStop(1, '#9a7008');
    ctx.fillStyle = grad;
    ctx.fillRect(b.x, podiumBaseY - b.h, b.w, b.h);
    // Edge
    ctx.strokeStyle = '#7a5508'; ctx.lineWidth = 2;
    ctx.strokeRect(b.x, podiumBaseY - b.h, b.w, b.h);
    // Number
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(b.label, b.x + b.w / 2, podiumBaseY - 12);
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(b.x + 2, podiumBaseY - b.h, b.w - 4, 4);
  });
}

function drawWinner(index) {
  const cx = podiumX[index];
  const footY = podiumBaseY - podiumH[index];
  const isActive = index === currentThrower && state === 'aim';

  ctx.save();
  ctx.translate(cx, footY);

  // Legs
  ctx.fillStyle = '#e8b87a';
  ctx.fillRect(-6, -18, 5, 18); ctx.fillRect(1, -18, 5, 18);
  // Shoes
  ctx.fillStyle = '#333';
  ctx.fillRect(-7, -3, 7, 4); ctx.fillRect(0, -3, 7, 4);

  // Body (triathlon suit - blue)
  ctx.fillStyle = '#0d47a1';
  ctx.beginPath();
  ctx.moveTo(-12, -55); ctx.lineTo(12, -55);
  ctx.quadraticCurveTo(15, -40, 13, -18);
  ctx.lineTo(-13, -18);
  ctx.quadraticCurveTo(-15, -40, -12, -55);
  ctx.closePath(); ctx.fill();
  // Suit stripe
  ctx.fillStyle = '#1976D2';
  ctx.fillRect(-3, -55, 6, 37);

  // Arms
  ctx.fillStyle = '#e8b87a';
  ctx.fillRect(-16, -52, 6, 22);
  ctx.fillRect(10, -52, 6, 22);

  // Head
  ctx.fillStyle = '#e8b87a';
  ctx.beginPath(); ctx.arc(0, -65, 12, 0, Math.PI * 2); ctx.fill();
  // Hair
  ctx.fillStyle = index === 0 ? '#2c1a0e' : index === 1 ? '#8b6935' : '#1a1a1a';
  ctx.beginPath(); ctx.arc(0, -70, 10, Math.PI, 0.1); ctx.fill();
  // Ponytail
  ctx.fillRect(6, -72, 3, 18);
  // Face
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-3, -66, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -66, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#b07050'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(0, -62, 3, 0.3, Math.PI - 0.3); ctx.stroke();

  // Medal
  ctx.fillStyle = ['#ffd700','#c0c0c0','#cd7f32'][index];
  ctx.strokeStyle = ['#b8960b','#888','#8b5a1a'][index]; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -42, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // Bouquet in hand
  if (index >= currentThrower && state !== 'done') {
    drawBouquetSmall(14, -38);
  }

  ctx.restore();

  // Active indicator
  if (isActive) {
    ctx.strokeStyle = 'rgba(255,215,0,0.7)'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.arc(cx, footY - 45, 32, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawBouquetSmall(x, y) {
  ctx.fillStyle = '#228B22';
  ctx.fillRect(x - 1.5, y + 3, 3, 10);
  const colors = ['#ff4081','#ff6f00','#e91e63','#ffeb3b','#f44336'];
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = colors[i];
    const a = (i / 5) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(x + Math.cos(a) * 5, y + Math.sin(a) * 4, 4, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBouquetFlying(x, y) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(Date.now() * 0.005);
  ctx.fillStyle = '#228B22'; ctx.fillRect(-1.5, 0, 3, 14);
  const colors = ['#ff4081','#ff6f00','#e91e63','#ffeb3b','#f44336','#9c27b0'];
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = colors[i];
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(Math.cos(a) * 8, Math.sin(a) * 6 - 4, 5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawMan() {
  const x = manPos.x, y = manPos.y;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x, y + 42, 16, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.fillStyle = '#222'; ctx.fillRect(x - 8, y + 22, 7, 20); ctx.fillRect(x + 1, y + 22, 7, 20);
  // Trench coat body
  const coatGrad = ctx.createLinearGradient(x - 16, y - 35, x + 16, y + 25);
  coatGrad.addColorStop(0, '#2a2a2a'); coatGrad.addColorStop(0.5, '#1a1a1a'); coatGrad.addColorStop(1, '#111');
  ctx.fillStyle = coatGrad;
  ctx.beginPath();
  ctx.moveTo(x - 14, y - 30); ctx.lineTo(x + 14, y - 30);
  ctx.quadraticCurveTo(x + 18, y, x + 17, y + 25);
  ctx.lineTo(x - 17, y + 25);
  ctx.quadraticCurveTo(x - 18, y, x - 14, y - 30);
  ctx.closePath(); ctx.fill();
  // Belt
  ctx.fillStyle = '#444'; ctx.fillRect(x - 14, y - 2, 28, 3);
  // Collar
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.moveTo(x - 8, y - 30); ctx.lineTo(x - 12, y - 38); ctx.lineTo(x - 4, y - 34); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x + 8, y - 30); ctx.lineTo(x + 12, y - 38); ctx.lineTo(x + 4, y - 34); ctx.fill();
  // Head
  ctx.fillStyle = '#e0b88a';
  ctx.beginPath(); ctx.arc(x, y - 48, 13, 0, Math.PI * 2); ctx.fill();
  // Hair (dunkelblond, kurz)
  ctx.fillStyle = '#8b7335';
  ctx.beginPath(); ctx.arc(x, y - 53, 11, Math.PI + 0.3, -0.3); ctx.fill();
  // Sunglasses
  ctx.fillStyle = '#0a0a0a';
  roundRectPath(x - 11, y - 52, 9, 6, 2); ctx.fill();
  roundRectPath(x + 2, y - 52, 9, 6, 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x - 2, y - 49); ctx.lineTo(x + 2, y - 49); ctx.stroke();
  // Nose
  ctx.fillStyle = 'rgba(180,140,100,0.4)';
  ctx.beginPath(); ctx.arc(x, y - 44, 2, 0, Math.PI * 2); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#a07050'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x - 4, y - 40); ctx.lineTo(x + 4, y - 40); ctx.stroke();
  // Arms
  ctx.fillStyle = '#1a1a1a';
  if (state === 'flying' || (state === 'caught' && caughtBy === 'man')) {
    // Reaching up
    ctx.beginPath(); ctx.moveTo(x - 14, y - 25); ctx.lineTo(x - 24, y - 45); ctx.lineTo(x - 18, y - 47); ctx.lineTo(x - 10, y - 25); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 14, y - 25); ctx.lineTo(x + 24, y - 45); ctx.lineTo(x + 18, y - 47); ctx.lineTo(x + 10, y - 25); ctx.fill();
  } else {
    ctx.fillRect(x - 18, y - 25, 6, 30); ctx.fillRect(x + 12, y - 25, 6, 30);
  }
  // Bouquet if passing
  if (state === 'passing' && passState === 0 && caughtBy === 'man') {
    const bx = x + (womanPos.x - x) * passProgress;
    const by = (y - 30) + ((womanPos.y - 30) - (y - 30)) * passProgress - Math.sin(passProgress * Math.PI) * 30;
    drawBouquetSmall(bx, by);
  }
}

function drawWoman() {
  const x = womanPos.x, y = womanPos.y;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(x, y + 38, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.fillStyle = '#b07840'; ctx.fillRect(x - 5, y + 18, 5, 18); ctx.fillRect(x, y + 18, 5, 18);
  // Dress (red, elegant)
  const dressGrad = ctx.createLinearGradient(x, y - 28, x, y + 20);
  dressGrad.addColorStop(0, '#d32f2f'); dressGrad.addColorStop(1, '#b71c1c');
  ctx.fillStyle = dressGrad;
  ctx.beginPath();
  ctx.moveTo(x - 10, y - 25); ctx.lineTo(x + 10, y - 25);
  ctx.quadraticCurveTo(x + 15, y, x + 14, y + 20);
  ctx.lineTo(x - 14, y + 20);
  ctx.quadraticCurveTo(x - 15, y, x - 10, y - 25);
  ctx.closePath(); ctx.fill();
  // Neckline
  ctx.fillStyle = '#b07840';
  ctx.beginPath(); ctx.arc(x, y - 25, 5, 0, Math.PI); ctx.fill();
  // Head
  ctx.fillStyle = '#b07840';
  ctx.beginPath(); ctx.arc(x, y - 38, 11, 0, Math.PI * 2); ctx.fill();
  // Hair (long black)
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.arc(x, y - 42, 10, Math.PI + 0.2, -0.2); ctx.fill();
  // Long hair strands
  ctx.fillRect(x - 9, y - 40, 3, 28);
  ctx.fillRect(x + 6, y - 40, 3, 28);
  ctx.beginPath(); ctx.ellipse(x, y - 43, 9, 5, 0, Math.PI, 0); ctx.fill();
  // Face
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x - 3, y - 39, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3, y - 39, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#8b4020'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x, y - 34, 3, 0.3, Math.PI - 0.3); ctx.stroke();
  // Arms
  ctx.fillStyle = '#b07840';
  if (state === 'flying' || (state === 'caught' && caughtBy === 'woman')) {
    ctx.beginPath(); ctx.moveTo(x - 10, y - 22); ctx.lineTo(x - 18, y - 40); ctx.lineTo(x - 13, y - 42); ctx.lineTo(x - 7, y - 22); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x + 10, y - 22); ctx.lineTo(x + 18, y - 40); ctx.lineTo(x + 13, y - 42); ctx.lineTo(x + 7, y - 22); ctx.fill();
  } else {
    ctx.fillRect(x - 14, y - 22, 5, 22); ctx.fillRect(x + 9, y - 22, 5, 22);
  }
  // Bouquet if passing to child
  if (state === 'passing' && ((passState === 1) || (passState === 0 && caughtBy === 'woman'))) {
    const fromX = x, fromY = y - 25;
    const toX = childPos.x, toY = childPos.y - 20;
    const bx = fromX + (toX - fromX) * passProgress;
    const by = fromY + (toY - fromY) * passProgress - Math.sin(passProgress * Math.PI) * 25;
    drawBouquetSmall(bx, by);
  }
}

function drawChild() {
  const x = childPos.x, y = childPos.y;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.ellipse(x, y + 32, 11, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Legs
  ctx.fillStyle = '#e2bb92'; ctx.fillRect(x - 4, y + 14, 4, 16); ctx.fillRect(x, y + 14, 4, 16);
  // Shoes
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(x - 5, y + 28, 6, 4); ctx.fillRect(x - 1, y + 28, 6, 4);
  // White skirt
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(x - 8, y + 2); ctx.lineTo(x + 8, y + 2);
  ctx.quadraticCurveTo(x + 12, y + 10, x + 10, y + 16);
  ctx.lineTo(x - 10, y + 16);
  ctx.quadraticCurveTo(x - 12, y + 10, x - 8, y + 2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.5; ctx.stroke();
  // Beige cardigan
  ctx.fillStyle = '#d4b896';
  ctx.beginPath();
  ctx.moveTo(x - 8, y - 16); ctx.lineTo(x + 8, y - 16);
  ctx.quadraticCurveTo(x + 10, y - 5, x + 9, y + 4);
  ctx.lineTo(x - 9, y + 4);
  ctx.quadraticCurveTo(x - 10, y - 5, x - 8, y - 16);
  ctx.closePath(); ctx.fill();
  // Cardigan line
  ctx.strokeStyle = '#b09878'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x, y - 14); ctx.lineTo(x, y + 3); ctx.stroke();
  // Head
  ctx.fillStyle = '#e2bb92';
  ctx.beginPath(); ctx.arc(x, y - 26, 10, 0, Math.PI * 2); ctx.fill();
  // Hair (dark brown, long)
  ctx.fillStyle = '#3d2314';
  ctx.beginPath(); ctx.arc(x, y - 30, 9, Math.PI + 0.2, -0.2); ctx.fill();
  ctx.fillRect(x - 8, y - 30, 3, 22);
  ctx.fillRect(x + 5, y - 30, 3, 22);
  ctx.beginPath(); ctx.ellipse(x, y - 31, 8, 4, 0, Math.PI, 0); ctx.fill();
  // Face
  if (childHappy > 0) {
    // Happy eyes (sparkly)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x - 3, y - 27, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 3, y - 27, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5c3317';
    ctx.beginPath(); ctx.arc(x - 3, y - 27, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 3, y - 27, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x - 2, y - 28, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 4, y - 28, 1, 0, Math.PI * 2); ctx.fill();
    // Big smile
    ctx.fillStyle = '#c0503a';
    ctx.beginPath(); ctx.arc(x, y - 21, 4, 0, Math.PI); ctx.fill();
    // Blush
    ctx.fillStyle = 'rgba(255,130,130,0.4)';
    ctx.beginPath(); ctx.ellipse(x - 7, y - 23, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + 7, y - 23, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
    // Bouquet held up
    drawBouquetSmall(x + 12, y - 18);
  } else {
    // Normal face
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(x - 3, y - 27, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 3, y - 27, 2, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#a07050'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y - 22, 3, 0.3, Math.PI - 0.3); ctx.stroke();
  }
  // Arms
  ctx.fillStyle = '#e2bb92';
  if (state === 'flying' || childHappy > 0) {
    // Arms up
    ctx.fillRect(x - 12, y - 14, 4, 16); ctx.fillRect(x + 8, y - 14, 4, 16);
  } else {
    ctx.fillRect(x - 11, y - 12, 4, 14); ctx.fillRect(x + 7, y - 12, 4, 14);
  }
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}

function drawAimLine() {
  if (!aiming || state !== 'aim') return;
  const sx = podiumX[currentThrower];
  const sy = podiumBaseY - podiumH[currentThrower] - 55;
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(aimX, aimY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(aimX, aimY, 15, 0, Math.PI * 2); ctx.stroke();
}

// Game logic
function throwBouquet(targetX, targetY) {
  if (state !== 'aim') return;
  startMusic();
  const sx = podiumX[currentThrower];
  const sy = podiumBaseY - podiumH[currentThrower] - 55;
  // Calculate velocity to reach target in ~40 frames
  const frames = 40;
  const gravity = 0.15;
  bouquet = {
    x: sx, y: sy,
    vx: (targetX - sx) / frames,
    vy: (targetY - sy) / frames - (gravity * frames) / 2
  };
  state = 'flying';
  playCheer();
}

function update() {
  if (state === 'flying' && bouquet) {
    bouquet.x += bouquet.vx;
    bouquet.y += bouquet.vy;
    bouquet.vy += 0.15;
    // Check catch - man first (closest), then woman, then child
    if (canCatch(bouquet.x, bouquet.y, 'man')) {
      caughtBy = 'man'; state = 'caught'; playCatch();
      setTimeout(() => { state = 'passing'; passState = 0; passProgress = 0; }, 600);
    } else if (canCatch(bouquet.x, bouquet.y, 'woman')) {
      caughtBy = 'woman'; state = 'caught'; playCatch();
      setTimeout(() => { state = 'passing'; passState = 0; passProgress = 0; }, 600);
    } else if (canCatch(bouquet.x, bouquet.y, 'child')) {
      caughtBy = 'child'; state = 'caught';
      score += 30; playYay();
      showMsg('🎉 Direkt gefangen! +30 Punkte!', 2000);
      childHappy = 180;
      setTimeout(nextThrow, 2500);
    } else if (bouquet.y > H + 20 || bouquet.x > W + 20) {
      // Missed everyone
      showMsg('😅 Daneben!', 1500);
      setTimeout(nextThrow, 1800);
    }
  }

  if (state === 'passing') {
    passProgress += 0.025;
    if (passProgress >= 1) {
      if (caughtBy === 'man' && passState === 0) {
        // Man passes to woman
        passState = 1; passProgress = 0;
        score += 10;
        showMsg('Mann fängt → gibt weiter! +10', 1500);
      } else {
        // Woman passes to child (either from man or direct)
        if (caughtBy === 'woman' && passState === 0) {
          score += 20;
          showMsg('Frau fängt → gibt weiter! +20', 1500);
        } else if (passState === 1) {
          // Already scored from man catch
        }
        childHappy = 180; playYay();
        setTimeout(nextThrow, 2000);
        state = 'celebrate';
      }
    }
  }

  if (childHappy > 0) childHappy--;
  document.getElementById('score').textContent = score;
}

function nextThrow() {
  if (state === 'done') return;
  currentThrower++;
  throwsLeft--;
  document.getElementById('throws').textContent = currentThrower;
  if (currentThrower >= 3) {
    state = 'done';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameover').style.display = 'block';
  } else {
    state = 'aim';
    bouquet = null;
  }
}

function restart() {
  currentThrower = 0; throwsLeft = 3; score = 0; state = 'aim';
  bouquet = null; childHappy = 0; caughtBy = '';
  document.getElementById('throws').textContent = '0';
  document.getElementById('score').textContent = '0';
  document.getElementById('gameover').style.display = 'none';
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawCrowd();
  drawPodium();
  for (let i = 0; i < 3; i++) drawWinner(i);
  drawMan(); drawWoman(); drawChild();
  if (state === 'flying' && bouquet) drawBouquetFlying(bouquet.x, bouquet.y);
  drawAimLine();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// Input
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousedown', e => { audioCtx.resume(); aiming = true; const p = getCanvasPos(e); aimX = p.x; aimY = p.y; });
canvas.addEventListener('mousemove', e => { if (aiming) { const p = getCanvasPos(e); aimX = p.x; aimY = p.y; } });
canvas.addEventListener('mouseup', e => { if (aiming) { aiming = false; throwBouquet(aimX, aimY); } });
canvas.addEventListener('touchstart', e => { e.preventDefault(); audioCtx.resume(); aiming = true; const p = getCanvasPos(e); aimX = p.x; aimY = p.y; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (aiming) { const p = getCanvasPos(e); aimX = p.x; aimY = p.y; } });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (aiming) { aiming = false; throwBouquet(aimX, aimY); } });

loop();
</script>
